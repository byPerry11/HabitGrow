openapi: 3.0.3
info:
  title: HabitGrow API
  version: 1.0.0
  description: API para seguimiento de hábitos con sistema de gamificación mediante
    mascota virtual
paths:
  /api/v1/dashboard/me/:
    get:
      operationId: v1_dashboard_me_retrieve
      description: |-
        Retorna todos los datos del dashboard del usuario autenticado.

        GET /api/v1/dashboard/me/

        Response:
        {
            "user": {...},
            "profile": {...},
            "mascota": {...},
            "habits": [...],
            "recent_logs": [...],
            "stats": {
                "total_habits": 5,
                "habits_activos": 3,
                "habits_cumplidos_hoy": 2,
                "racha_maxima": 10,
                "dias_consecutivos": 5
            }
        }
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/habit-logs/:
    get:
      operationId: v1_habit_logs_list
      description: |-
        ViewSet completo CRUD para HabitLog.

        Permite registrar, ver, actualizar y eliminar registros de hábitos.

        Endpoints:
        - GET    /api/v1/habit-logs/ - Lista de logs del usuario
        - POST   /api/v1/habit-logs/ - Crear log (marcar hábito)
        - GET    /api/v1/habit-logs/{id}/ - Detalle de log
        - PATCH  /api/v1/habit-logs/{id}/ - Actualizar log
        - DELETE /api/v1/habit-logs/{id}/ - Eliminar log
        - GET    /api/v1/habit-logs/today/ - Logs de hoy
        - GET    /api/v1/habit-logs/week/ - Logs de esta semana
      parameters:
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHabitLogList'
          description: ''
    post:
      operationId: v1_habit_logs_create
      description: |-
        ViewSet completo CRUD para HabitLog.

        Permite registrar, ver, actualizar y eliminar registros de hábitos.

        Endpoints:
        - GET    /api/v1/habit-logs/ - Lista de logs del usuario
        - POST   /api/v1/habit-logs/ - Crear log (marcar hábito)
        - GET    /api/v1/habit-logs/{id}/ - Detalle de log
        - PATCH  /api/v1/habit-logs/{id}/ - Actualizar log
        - DELETE /api/v1/habit-logs/{id}/ - Eliminar log
        - GET    /api/v1/habit-logs/today/ - Logs de hoy
        - GET    /api/v1/habit-logs/week/ - Logs de esta semana
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HabitLogCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HabitLogCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HabitLogCreate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitLogCreate'
          description: ''
