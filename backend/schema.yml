            schema:
              $ref: '#/components/schemas/PatchedMascota'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mascota'
          description: ''
    delete:
      operationId: v1_mascota_destroy
      description: |-
        ViewSet para Mascota.

        Permite ver y actualizar el nombre (sobrenombre) de la mascota del usuario.
        Incluye acciones personalizadas para curar la mascota y actualizar su salud.

        Endpoints:
        - GET    /api/v1/mascota/ - Lista (solo la del usuario)
        - GET    /api/v1/mascota/me/ - Mascota del usuario autenticado
        - PATCH  /api/v1/mascota/{id}/ - Actualizar sobrenombre
        - POST   /api/v1/mascota/{id}/adoptar/ - Adoptar mascota (asignar nombre inicial)
        - POST   /api/v1/mascota/{id}/heal/ - Curar mascota (manual)
        - POST   /api/v1/mascota/{id}/update_health/ - Actualizar salud
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/mascota/{id}/heal/:
    post:
      operationId: v1_mascota_heal_create
      description: |-
        Cura la mascota manualmente (restaura puntos de vida).

        POST /api/v1/mascota/{id}/heal/
        Body: { "amount": 20 }  (opcional, default: 10)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Mascota'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Mascota'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Mascota'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mascota'
          description: ''
  /api/v1/mascota/{id}/update_health/:
    post:
      operationId: v1_mascota_update_health_create
      description: |-
        Actualiza la salud de la mascota basándose en la actividad del usuario.

        POST /api/v1/mascota/{id}/update_health/
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Mascota'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Mascota'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Mascota'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mascota'
          description: ''
  /api/v1/mascota/adoptar/:
    post:
      operationId: v1_mascota_adoptar_create
      description: |-
        Adopta una mascota asignándole un sobrenombre.

        POST /api/v1/mascota/adoptar/
        Body: { "nombre": "Plantita Feliz" }
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Mascota'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Mascota'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Mascota'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mascota'
          description: ''
  /api/v1/mascota/me/:
    get:
      operationId: v1_mascota_me_retrieve
      description: |-
