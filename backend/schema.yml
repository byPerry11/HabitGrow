components:
  schemas:
    EstadoEnum:
      enum:
      - cumplido
      - no_cumplido
      type: string
      description: |-
        * `cumplido` - Cumplido
        * `no_cumplido` - No Cumplido
    EstadoSaludEnum:
      enum:
      - optimo
      - regular
      - mal
      - marchito
      type: string
      description: |-
        * `optimo` - Óptimo
        * `regular` - Regular
        * `mal` - Mal
        * `marchito` - Marchito
    FrecuenciaEnum:
      enum:
      - diaria
      - semanal
      - personalizada
      type: string
      description: |-
        * `diaria` - Diaria
        * `semanal` - Semanal
        * `personalizada` - Personalizada
    Habit:
      type: object
      description: |-
        Serializer para el modelo Habit.
        Incluye estadísticas calculadas.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
          title: Usuario
        username:
          type: string
          readOnly: true
        nombre:
          type: string
          title: Nombre del Hábito
          maxLength: 200
        descripcion:
          type: string
          title: Descripción
          description: Descripción opcional del hábito
        frecuencia:
          $ref: '#/components/schemas/FrecuenciaEnum'
        frecuencia_display:
          type: string
          readOnly: true
        meta_semanal:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Veces por semana que se debe completar
        activo:
          type: boolean
          description: Si el hábito está activo o archivado
        fecha_creacion:
          type: string
          format: date-time
          readOnly: true
          title: Fecha de Creación
        fecha_actualizacion:
          type: string
          format: date-time
          readOnly: true
          title: Última Actualización
        racha_actual:
          type: string
          readOnly: true
        total_completados:
          type: string
          readOnly: true
      required:
      - fecha_actualizacion
      - fecha_creacion
      - frecuencia_display
      - id
      - nombre
      - racha_actual
      - total_completados
      - user
      - username
    HabitCreate:
      type: object
      description: Serializer simplificado para crear hábitos.
      properties:
        nombre:
          type: string
          title: Nombre del Hábito
          maxLength: 200
        descripcion:
          type: string
          title: Descripción
          description: Descripción opcional del hábito
        frecuencia:
          $ref: '#/components/schemas/FrecuenciaEnum'
        meta_semanal:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Veces por semana que se debe completar
        activo:
          type: boolean
          description: Si el hábito está activo o archivado
      required:
      - nombre
    HabitLog:
      type: object
      description: Serializer para el modelo HabitLog.
      properties:
        id:
          type: integer
          readOnly: true
        habit:
          type: integer
