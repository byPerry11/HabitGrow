version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: habitgrow_db
    environment:
      POSTGRES_DB: habitgrow_db
      POSTGRES_USER: habitgrow_user
      POSTGRES_PASSWORD: habitgrow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitgrow_user -d habitgrow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: habitgrow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
