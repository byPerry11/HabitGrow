server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html dashboard.html;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Manejo de rutas y archivos estáticos
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Caché para activos estáticos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|json|webmanifest)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Configuración especial para el Service Worker (no cachear)
    location = /sw.js {
        expires -1;
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Error 404
    error_page 404 /index.html;

    # Bloquear acceso a archivos ocultos (.git, .env, etc)
    location ~ /\. {
        deny all;
    }
}
